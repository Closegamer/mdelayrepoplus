# Образ приложения собирается в GitHub Actions и пушится в GHCR; на сервере — pull без сборки.
# Локально: docker compose build / up --build (секция build ниже).
x-app-base: &app-base
  image: ${APP_IMAGE:-ghcr.io/closegamer/mdelayrepoplus:main}
  build:
    context: .
    dockerfile: Dockerfile
  restart: unless-stopped
  user: "${HOST_UID:-1000}:${HOST_GID:-1000}"
  env_file:
    - .env
  volumes:
    - .:/app

services:
  db:
    image: postgres:16-alpine
    container_name: kakdelatorbot-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    <<: *app-base
    container_name: kakdelatorbot-api
    depends_on:
      - db
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
  bot:
    <<: *app-base
    container_name: kakdelatorbot-bot
    depends_on:
      - api
    command: python -m bot.main
  cron:
    <<: *app-base
    container_name: kakdelatorbot-cron
    depends_on:
      - db
      - api
    command: python -m cron.main
  ui:
    <<: *app-base
    container_name: kakdelatorbot-ui
    depends_on:
      - api
    command: streamlit run ui/app.py --server.port 8501 --server.address 0.0.0.0
    ports:
      - "8501:8501"

volumes:
  postgres_data:
