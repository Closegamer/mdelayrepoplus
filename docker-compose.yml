services:
  db:
    image: postgres:16-alpine
    container_name: mdelayrepoplus-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mdelayrepoplus-api
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      - db
    command: python -m app.main
    volumes:
      - .:/app
    ports:
      - "8000:8000"
  bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mdelayrepoplus-bot
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      - api
    command: python -m bot.main
    volumes:
      - .:/app
  cron:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mdelayrepoplus-cron
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      - db
      - api
    command: python -m cron.main
    volumes:
      - .:/app

volumes:
  postgres_data:
