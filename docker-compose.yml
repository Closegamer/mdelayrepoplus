services:
  db:
    image: postgres:16-alpine
    container_name: kakdelatorbot-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kakdelatorbot-api
    restart: unless-stopped
    user: "${HOST_UID:-1000}:${HOST_GID:-1000}"
    env_file:
      - .env
    depends_on:
      - db
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    volumes:
      - .:/app
    ports:
      - "8000:8000"
  bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kakdelatorbot-bot
    restart: unless-stopped
    user: "${HOST_UID:-1000}:${HOST_GID:-1000}"
    env_file:
      - .env
    depends_on:
      - api
    command: python -m bot.main
    volumes:
      - .:/app
  cron:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kakdelatorbot-cron
    restart: unless-stopped
    user: "${HOST_UID:-1000}:${HOST_GID:-1000}"
    env_file:
      - .env
    depends_on:
      - db
      - api
    command: python -m cron.main
    volumes:
      - .:/app
  ui:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kakdelatorbot-ui
    restart: unless-stopped
    user: "${HOST_UID:-1000}:${HOST_GID:-1000}"
    env_file:
      - .env
    depends_on:
      - api
    command: streamlit run ui/app.py --server.port 8501 --server.address 0.0.0.0
    volumes:
      - .:/app
    ports:
      - "8501:8501"

volumes:
  postgres_data:
