name: CI/CD

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Compile Python code
        run: python -m compileall app bot cron ui

      - name: Build Docker image
        run: docker build -t kakdelatorbot-app:ci .

  # Образ с pip-зависимостями собирается на раннере GitHub и пушится в GHCR — VPS только скачивает слой.
  build-push:
    runs-on: ubuntu-latest
    needs: ci
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    outputs:
      app_image: ${{ steps.meta.outputs.full }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Image name (ghcr.io, lowercase)
        id: meta
        run: |
          R=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')
          echo "full=ghcr.io/${R}:main" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        run: |
          IMG="${{ steps.meta.outputs.full }}"
          docker build -t "$IMG" -t "${IMG%:main}:${GITHUB_SHA}" .
          docker push "$IMG"
          docker push "${IMG%:main}:${GITHUB_SHA}"

  deploy:
    runs-on: ubuntu-latest
    needs: build-push
    if: github.ref == 'refs/heads/main'
    # Секреты: DEPLOY_HOST, DEPLOY_USER, DEPLOY_PORT, DEPLOY_SSH_KEY, DEPLOY_APP_DIR, GH_REPO_TOKEN,
    # POSTGRES_*, BOT_*, …
    # Опционально для приватного пакета GHCR: GHCR_USER + GHCR_READ_TOKEN (classic PAT: read:packages).

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_HOST: ${{ secrets.POSTGRES_HOST }}
          POSTGRES_PORT: ${{ secrets.POSTGRES_PORT }}
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          ALERT_CHAT_ID: ${{ secrets.ALERT_CHAT_ID }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
          SCHEDULER_POLL_SECONDS: ${{ secrets.SCHEDULER_POLL_SECONDS }}
          CHECK1_SECONDS: ${{ secrets.CHECK1_SECONDS }}
          CHECK2_SECONDS: ${{ secrets.CHECK2_SECONDS }}
          CHECK3_SECONDS: ${{ secrets.CHECK3_SECONDS }}
          BOT_POLLING_TIMEOUT_SECONDS: ${{ secrets.BOT_POLLING_TIMEOUT_SECONDS }}
          BOT_POLLING_READ_TIMEOUT_SECONDS: ${{ secrets.BOT_POLLING_READ_TIMEOUT_SECONDS }}
          BOT_POLLING_CONNECT_TIMEOUT_SECONDS: ${{ secrets.BOT_POLLING_CONNECT_TIMEOUT_SECONDS }}
          BOT_POLLING_POOL_TIMEOUT_SECONDS: ${{ secrets.BOT_POLLING_POOL_TIMEOUT_SECONDS }}
          BOT_POLLING_INTERVAL_SECONDS: ${{ secrets.BOT_POLLING_INTERVAL_SECONDS }}
          COMPOSE_PARALLEL_LIMIT: ${{ secrets.COMPOSE_PARALLEL_LIMIT }}
          DEPLOY_IMAGE: ${{ needs.build-push.outputs.app_image }}
          GHCR_USER: ${{ secrets.GHCR_USER }}
          GHCR_READ_TOKEN: ${{ secrets.GHCR_READ_TOKEN }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT }}
          # Подключение к хосту (не путать с command_timeout): на загруженном VPS 30s по умолчанию может не хватать
          timeout: 2m
          # pull + extract образа с GHCR на слабом VPS может занять >20m (см. Run Command Timeout)
          command_timeout: 60m
          envs: POSTGRES_DB,POSTGRES_USER,POSTGRES_PASSWORD,POSTGRES_HOST,POSTGRES_PORT,BOT_TOKEN,ALERT_CHAT_ID,ADMIN_PASSWORD,SCHEDULER_POLL_SECONDS,CHECK1_SECONDS,CHECK2_SECONDS,CHECK3_SECONDS,BOT_POLLING_TIMEOUT_SECONDS,BOT_POLLING_READ_TIMEOUT_SECONDS,BOT_POLLING_CONNECT_TIMEOUT_SECONDS,BOT_POLLING_POOL_TIMEOUT_SECONDS,BOT_POLLING_INTERVAL_SECONDS,COMPOSE_PARALLEL_LIMIT,DEPLOY_IMAGE,GHCR_USER,GHCR_READ_TOKEN
          script_stop: true
          script: |
            set -e
            echo "=== deploy: старт $(date -u '+%Y-%m-%dT%H:%M:%SZ') ==="
            echo "user=$(whoami) uid=$(id -u) gid=$(id -g)"
            APP_DIR="${{ secrets.DEPLOY_APP_DIR }}"
            REPO_URL="https://x-access-token:${{ secrets.GH_REPO_TOKEN }}@github.com/Closegamer/mdelayrepoplus.git"
            if [ -z "$APP_DIR" ]; then
              echo "ERROR: секрет DEPLOY_APP_DIR пуст — добавьте его в Settings → Secrets → Actions" >&2
              exit 1
            fi
            echo "APP_DIR задан (длина ${#APP_DIR} символов)"
            APP_DIR="${APP_DIR%/}"
            parent_dir="$(dirname "$APP_DIR")"
            # git clone создаёт каталог APP_DIR — нужны права на запись в parent (в /opt у обычного пользователя их нет)
            if [ ! -d "$APP_DIR" ] && { [ ! -w "$parent_dir" ] || [ ! -x "$parent_dir" ]; }; then
              echo "ERROR: нельзя создать каталог $APP_DIR — нет прав на родительский каталог $parent_dir." >&2
              echo "Частый случай: DEPLOY_APP_DIR=/opt/... при пользователе deploy." >&2
              echo "Вариант A — сменить секрет на каталог в домашней папке, например: /home/$(whoami)/mdelayrepoplus" >&2
              echo "Вариант B на сервере под root: sudo mkdir -p $APP_DIR && sudo chown $(whoami):$(whoami) $APP_DIR" >&2
              exit 1
            fi

            if [ ! -d "$APP_DIR/.git" ]; then
              parent="$parent_dir"
              if ! mkdir -p "$parent"; then
                echo "ERROR: mkdir -p $parent не удался" >&2
                exit 1
              fi
              if [ -d "$APP_DIR" ]; then
                if [ -z "$(ls -A "$APP_DIR" 2>/dev/null)" ]; then
                  rmdir "$APP_DIR" 2>/dev/null || {
                    echo "ERROR: не удалось удалить пустой каталог $APP_DIR. Под root:" >&2
                    echo "  sudo rmdir \"$APP_DIR\" || sudo rm -rf \"$APP_DIR\"" >&2
                    exit 1
                  }
                else
                  echo "ERROR: $APP_DIR есть, но нет .git (удалён .git или копия без репозитория)." >&2
                  echo "Остановите контейнеры и удалите каталог под root, затем перезапустите деплой:" >&2
                  echo "  cd \"$APP_DIR\" 2>/dev/null && docker compose down --remove-orphans 2>/dev/null || true" >&2
                  echo "  sudo rm -rf \"$APP_DIR\" && sudo mkdir -p \"$APP_DIR\" && sudo chown \"$(whoami):$(whoami)\" \"$APP_DIR\"" >&2
                  exit 1
                fi
              elif [ -e "$APP_DIR" ]; then
                echo "ERROR: $APP_DIR существует и это не каталог. Удалите вручную под root." >&2
                exit 1
              fi
              if ! git clone "$REPO_URL" "$APP_DIR"; then
                echo "ERROR: git clone не удался. Проверьте GH_REPO_TOKEN (доступ к репо) и сеть на сервере." >&2
                exit 1
              fi
            fi

            cd "$APP_DIR"
            if [ ! -w . ]; then
              echo "ERROR: нет прав на запись в $APP_DIR. На сервере: sudo chown -R $(whoami):$(whoami) $APP_DIR" >&2
              exit 1
            fi
            # Контейнеры с bind-mount могли создать root-owned файлы; git reset вызывает rm и падает с Permission denied
            if [ -f docker-compose.yml ] || [ -f compose.yaml ] || [ -f compose.yml ]; then
              docker compose down --remove-orphans 2>/dev/null || true
            fi
            git config --global --add safe.directory "$APP_DIR" || true
            git remote set-url origin "$REPO_URL"
            if ! git fetch origin main; then
              echo "ERROR: git fetch не удался" >&2
              exit 1
            fi
            if ! git reset --hard origin/main; then
              echo "ERROR: git reset --hard не удался. На сервере под root: chown -R $(whoami):$(whoami) $APP_DIR" >&2
              exit 1
            fi

            write_env() {
              key="$1"
              val="$2"
              clean="$(printf '%s' "$val" | tr '\r\n' ' ' | sed 's/[[:space:]]\+$//')"
              printf '%s=%s\n' "$key" "$clean" >> .env
            }

            : > .env
            write_env POSTGRES_DB "$POSTGRES_DB"
            write_env POSTGRES_USER "$POSTGRES_USER"
            write_env POSTGRES_PASSWORD "$POSTGRES_PASSWORD"
            write_env POSTGRES_HOST "$POSTGRES_HOST"
            write_env POSTGRES_PORT "$POSTGRES_PORT"
            write_env BOT_TOKEN "$BOT_TOKEN"
            write_env ALERT_CHAT_ID "$ALERT_CHAT_ID"
            write_env ADMIN_PASSWORD "$ADMIN_PASSWORD"
            write_env SCHEDULER_POLL_SECONDS "$SCHEDULER_POLL_SECONDS"
            write_env CHECK1_SECONDS "$CHECK1_SECONDS"
            write_env CHECK2_SECONDS "$CHECK2_SECONDS"
            write_env CHECK3_SECONDS "$CHECK3_SECONDS"
            write_env BOT_POLLING_TIMEOUT_SECONDS "$BOT_POLLING_TIMEOUT_SECONDS"
            write_env BOT_POLLING_READ_TIMEOUT_SECONDS "$BOT_POLLING_READ_TIMEOUT_SECONDS"
            write_env BOT_POLLING_CONNECT_TIMEOUT_SECONDS "$BOT_POLLING_CONNECT_TIMEOUT_SECONDS"
            write_env BOT_POLLING_POOL_TIMEOUT_SECONDS "$BOT_POLLING_POOL_TIMEOUT_SECONDS"
            write_env BOT_POLLING_INTERVAL_SECONDS "$BOT_POLLING_INTERVAL_SECONDS"
            if [ -n "${DEPLOY_IMAGE:-}" ]; then
              write_env APP_IMAGE "$DEPLOY_IMAGE"
            fi

            # Малый VPS: ограничить параллельную сборку (секрет COMPOSE_PARALLEL_LIMIT или 1).
            export COMPOSE_PARALLEL_LIMIT="${COMPOSE_PARALLEL_LIMIT:-1}"
            # Чтобы bind-mount не создавал файлы от root (__pycache__ и т.д.) — совпадает с пользователем deploy на хосте
            export HOST_UID="$(id -u)"
            export HOST_GID="$(id -g)"

            if [ -n "${GHCR_READ_TOKEN:-}" ] && [ -n "${GHCR_USER:-}" ]; then
              echo "$GHCR_READ_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin
            fi

            if docker compose version >/dev/null 2>&1; then
              echo "=== docker compose pull ==="
              if ! docker compose pull; then
                echo "ERROR: docker compose pull не удался (образ в GHCR, сеть или права на ghcr.io)" >&2
                docker compose ps || true
                exit 1
              fi
              echo "=== docker compose up -d ==="
              if ! docker compose up -d --remove-orphans; then
                echo "ERROR: docker compose up завершился с ошибкой" >&2
                docker compose ps || true
                exit 1
              fi
            else
              echo "=== docker-compose pull ==="
              if ! docker-compose pull; then
                echo "ERROR: docker-compose pull не удался" >&2
                docker-compose ps || true
                exit 1
              fi
              echo "=== docker-compose up -d ==="
              if ! docker-compose up -d --remove-orphans; then
                echo "ERROR: docker-compose up завершился с ошибкой" >&2
                docker-compose ps || true
                exit 1
              fi
            fi

            echo "=== docker compose ps (финальный статус) ==="
            if docker compose version >/dev/null 2>&1; then
              docker compose ps
            else
              docker-compose ps
            fi
            echo "=== deploy: готово ==="
