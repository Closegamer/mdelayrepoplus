name: CI/CD

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Compile Python code
        run: python -m compileall app bot cron ui

      - name: Build Docker image
        run: docker build -t mdelayrepoplus-app:ci .

  deploy:
    runs-on: ubuntu-latest
    needs: ci
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT }}
          script_stop: true
          script: |
            set -eu
            APP_DIR="${{ secrets.DEPLOY_APP_DIR }}"
            REPO_URL="https://x-access-token:${{ secrets.GH_REPO_TOKEN }}@github.com/Closegamer/mdelayrepoplus.git"

            if [ ! -d "$APP_DIR/.git" ]; then
              rm -rf "$APP_DIR"
              git clone "$REPO_URL" "$APP_DIR"
            fi

            cd "$APP_DIR"
            git remote set-url origin "$REPO_URL"
            git fetch origin main
            git reset --hard origin/main

            cat > .env <<'EOF'
            POSTGRES_DB=${{ secrets.POSTGRES_DB }}
            POSTGRES_USER=${{ secrets.POSTGRES_USER }}
            POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
            POSTGRES_HOST=${{ secrets.POSTGRES_HOST }}
            POSTGRES_PORT=${{ secrets.POSTGRES_PORT }}
            BOT_TOKEN=${{ secrets.BOT_TOKEN }}
            ALERT_CHAT_ID=${{ secrets.ALERT_CHAT_ID }}
            ADMIN_PASSWORD=${{ secrets.ADMIN_PASSWORD }}
            SCHEDULER_POLL_SECONDS=${{ secrets.SCHEDULER_POLL_SECONDS }}
            CHECK1_SECONDS=${{ secrets.CHECK1_SECONDS }}
            CHECK2_SECONDS=${{ secrets.CHECK2_SECONDS }}
            CHECK3_SECONDS=${{ secrets.CHECK3_SECONDS }}
            EOF

            if docker compose version >/dev/null 2>&1; then
              docker compose up -d --build --remove-orphans
            else
              docker-compose up -d --build --remove-orphans
            fi
